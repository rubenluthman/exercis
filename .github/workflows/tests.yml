name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode_16" | sort -V | tail -1)
          sudo xcode-select -switch "/Applications/${XCODE}/Contents/Developer"
          xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild test \
            -project Exercis.xcodeproj \
            -scheme Exercis \
            -testPlan Exercis \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Plus' \
            -skipMacroValidation
